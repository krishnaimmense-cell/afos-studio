<!DOCTYPE html>
<html>
<head>
  <title>AFOS Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; font-family:Arial; background:#08090d; color:white; }
    header { padding:24px; background:#11131a; }
    h1 { margin:0; font-size:32px; }
    .sub { color:#aaa; margin-top:8px; }
    .btn { background:#ff9f43; color:#000; padding:14px 20px; border-radius:12px; display:inline-block; margin-top:20px; font-weight:bold; }
    .section { padding:24px; }
    .card { background:#151822; padding:18px; border-radius:16px; margin-bottom:14px; border:1px solid #252a35; }
    .stage { display:flex; justify-content:space-between; }
    .done { color:#55efc4; }
    .pending { color:#888; }
  </style>
</head>
<body>
  <header>
    <h1>AFOS Studio</h1>
    <div class="sub">Autonomous Filmmaking Operating System</div>
    <div class="btn">+ New Film Project</div>
  </header>

  <div class="section">
    <h2>Production Pipeline</h2>

    <div class="card stage"><span>Story Analysis</span><span class="done">Ready</span></div>
    <div class="card stage"><span>Director Vision</span><span class="pending">Not Started</span></div>
    <div class="card stage"><span>Characters</span><span class="pending">Not Started</span></div>
    <div class="card stage"><span>Environments</span><span class="pending">Not Started</span></div>
    <div class="card stage"><span>Camera Journey</span><span class="pending">Not Started</span></div>
    <div class="card stage"><span>Storyboard</span><span class="pending">Not Started</span></div>
    <div class="card stage"><span>Animation</span><span class="pending">Not Started</span></div>
    <div class="card stage"><span>Export</span><span class="pending">Not Started</span></div>
  </div>
</body>
</html>
